<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Learning Platform</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Navigation Bar */
        nav {
            background-color: #2c3e50;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: rgb(235, 229, 229);
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #4f15ad;
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 80vh;
            background-color: #9dc2d6;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero-content p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .hero-content button {
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        .hero-content button:hover {
            background-color: #2980b9;
        }

        /* Features Section */
        .features {
            padding: 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background-color: #ffffff;
        }

        .card {
            border: 2px solid #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {

            nav {
                flex-direction: column;
                gap: 10px;
            }

            .nav-links {
                flex-direction: column;
                align-items: center;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .hero-content h1 {
                font-size: 32px;
            }

            .hero-content p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">TechLearn</div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Courses</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Learn Web Development</h1>
            <p>Master HTML, CSS and JavaScript.</p>
            <button>Get Started</button>
        </div>
    </section>

    <!-- Features Section -->
    <section class="features">

        <div class="card">
            <h2>HTML</h2>
            <p>Learn the structure and foundation of web pages.</p>
        </div>

        <div class="card">
            <h2>CSS</h2>
            <p>Design beautiful and responsive websites with CSS.</p>
        </div>

        <div class="card">
            <h2>JavaScript</h2>
            <p>Add interactivity and dynamic behavior to web pages.</p>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 TechLearn</p>
    </footer>

</body>
</html>
