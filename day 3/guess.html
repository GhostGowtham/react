<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
</head>
<style>
    
    
</style>
<body>

    <h2>Guess the Number (1 to 10)</h2>

    <input type="number" id="guess" placeholder="Enter a number">
    <button onclick="checkGuess()">Guess</button>

    <p id="result"></p>

    <script>
        // Generate a random number between 1 and 10
        let randomNumber = Math.floor(Math.random() * 10) + 1;

        function checkGuess() {
            let userGuess = Number(document.getElementById("guess").value);
            let result = document.getElementById("result");

            if (userGuess === randomNumber) {
                result.innerHTML = "🎉 Correct! You guessed the number.";
            } else if (userGuess < randomNumber) {
                result.innerHTML = "📉 Too Low! Try Again.";
            } else {
                result.innerHTML = "📈 Too High! Try Again.";
            }
        }
    </script>

</body>
</html>
